name: Build Android APK

# سيتم تشغيل البناء عند رفع كود جديد أو تشغيله يدوياً
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # هذا السطر يضيف زر "Run workflow" لتشغيله يدوياً

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود من المستودع
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. إعداد بيئة بايثون
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. تثبيت المكتبات اللازمة لنظام لينكس وبناء الـ APK
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install buildozer cython setuptools

      # 4. تشغيل عملية البناء باستخدام Buildozer
      - name: Build with Buildozer
        run: |
          yes | buildozer android debug
        env:
          ACCEPT_SDK_LICENSE: "yes"

      # 5. استخراج ملف الـ APK ورفعه ليكون جاهزاً للتحميل
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: my-android-app
          path: bin/*.apk
