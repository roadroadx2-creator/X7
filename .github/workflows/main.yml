name: Build App
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt update
          # تم تحديث المكتبات هنا لتتوافق مع إصدار Ubuntu الجديد
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          pip install --upgrade Cython==0.29.33 buildozer

      - name: Build with Buildozer
        run: |
          # إضافة نعم (yes) للموافقة التلقائية على تراخيص Android
          yes | buildozer android debug
